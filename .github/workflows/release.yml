name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crates and GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag and version
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          TAG="${TAG#refs/tags/}"
          if [[ "$TAG" != v* ]]; then
            TAG="v${TAG#v}"
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Checkout release tag
        shell: bash
        run: |
          set -euo pipefail
          git checkout "${{ steps.meta.outputs.tag }}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          crate_version_published() {
            local crate="$1"
            curl -fsS "https://crates.io/api/v1/crates/${crate}/${VERSION}" >/dev/null 2>&1
          }

          publish_crate() {
            local crate="$1"
            if crate_version_published "$crate"; then
              echo "${crate} ${VERSION} is already published; skipping"
              return
            fi
            for attempt in $(seq 1 5); do
              if cargo publish -p "$crate" --locked; then
                return
              fi
              if crate_version_published "$crate"; then
                echo "${crate} ${VERSION} is already published after publish retry ${attempt}; continuing"
                return
              fi
              if [ "$attempt" -lt 5 ]; then
                echo "Publish attempt ${attempt}/5 failed for ${crate}; retrying after crates.io propagation delay"
                sleep 30
              fi
            done
            echo "error: failed to publish ${crate} ${VERSION}" >&2
            exit 1
          }

          wait_for_crate() {
            local crate="$1"
            for attempt in $(seq 1 20); do
              if crate_version_published "$crate"; then
                echo "${crate} ${VERSION} is visible on crates.io"
                return
              fi
              echo "Waiting for ${crate} ${VERSION} to become visible on crates.io (${attempt}/20)"
              sleep 15
            done
            echo "error: ${crate} ${VERSION} did not become visible on crates.io" >&2
            exit 1
          }

          publish_crate boardwalk-macros
          wait_for_crate boardwalk-macros
          publish_crate boardwalk
          wait_for_crate boardwalk

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: boardwalk ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
